name: Daily Job Scraper

# Run automatically at 8:00 AM IST (which is 2:30 AM UTC) every day
on:
  schedule:
    - cron: '30 2 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        # Let npm install dependencies; ubuntu-latest already has required system libs for Puppeteer
        run: npm ci || npm install

      - name: Run Job Scraper
        # We inject the secrets safely from GitHub Settings -> Secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        run: node index.js --run-now
